shooting_control_node:
  ros__parameters:

    # ── 機体形状 ─────────────────────────────────────────────────────
    # 発射口の地上高 [m]（石倉に乗った状態での高さ）
    # 石倉高さ(0.101m)はコード内で自動加算されるのでロボット床面からの高さを入れる
    shooter_height_m: 0.40

    # カゴ上端の地上高 [m]
    # 折りたたみコンテナ51Lの高さ（実測してここに入れる）
    # 床面置きの場合、ブルーシート分は無視してよい
    cage_rim_height_m: 0.37

    # ── 弾道パラメータ ───────────────────────────────────────────────
    # フライホイール最大初速 [m/s]
    # 実機で最大RPMのときの射出速度を計測して設定する
    max_v0: 6.0

    # 仰角の可動範囲 [deg]
    # サーボの物理的可動範囲に合わせて設定
    elevation_min_deg: 10.0
    elevation_max_deg: 60.0

    # ── フライホイール変換係数 ───────────────────────────────────────
    # [RPM / (m/s)]
    # キャリブレーション手順:
    #   1. 仰角固定で複数の距離からテスト射出
    #   2. カゴに届いたときのRPMとd, h から v0 を逆算
    #   3. rpm / v0 の平均値をここに入れる
    rpm_per_v0: 800.0

    # 待機中のフライホイール回転数 [RPM]
    # 0: 完全停止（バッテリー節約、起動に時間がかかる）
    # 非0: プリスピン（応答速度優先）
    flywheel_idle_rpm: 0.0

    # ── 正対判定閾値 ────────────────────────────────────────────────
    # /wall_detection/angle がこの範囲内なら「正対済み」とみなす
    align_angle_thresh_rad: 0.05   # ≈ 2.9°

    # 壁距離の許容誤差 [m]（現在は参照のみ、FSMが使う）
    align_dist_thresh_m: 0.10

    # ── タイミング ──────────────────────────────────────────────────
    # 発射後にフライホイールを停止するまでの待機時間 [s]
    post_fire_wait_s: 1.0

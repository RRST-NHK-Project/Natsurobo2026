cage_detection_node:
  ros__parameters:

    # ── 輪郭フィルタ ─────────────────────────────────────────────────
    # カゴ(51L折りたたみコンテナ)の画像上の面積範囲
    # 石倉上（高さ約101mm）から約2-4m先のカゴを想定
    # 実機確認後に調整すること
    min_contour_area: 1500.0    # px² (小さすぎる輪郭を除外)
    max_contour_area: 120000.0  # px² (フィールド床面全体を除外)

    # 折りたたみコンテナのアスペクト比（幅/高さ）
    # 正面から見ると横長、斜めから見ると正方形に近い
    min_aspect_ratio: 0.4
    max_aspect_ratio: 3.0

    # ── 深度取得 ─────────────────────────────────────────────────────
    # 重心周辺の深度中央値を取るROIサイズ [px]
    # 大きくすると安定するがカゴ端の誤深度を拾いやすくなる
    depth_roi_size: 5.0

    # 検出最大距離 [m] （これ以上遠いカゴは無視）
    max_detection_dist: 6.0

    # ── ToF補正 ─────────────────────────────────────────────────────
    # ToFとD456深度の加重平均比率
    # tof_weight=1.0: ToFのみ使用
    # tof_weight=0.0: D456のみ使用
    # 視野中央付近のカゴのみ補正が適用される（重心が中心から±15%以内）
    tof_weight: 0.6

    # ── EMA平滑化 ────────────────────────────────────────────────────
    # 0に近いほど強く平滑化（位置変動が少なくなる）
    # カゴは静止物なので低めに設定
    ema_alpha: 0.35

    # ── 優先度設定 ───────────────────────────────────────────────────
    # スタートゾーン対角の青カゴ判定閾値 [m]
    # この距離以上のカゴを「最遠青カゴ（+15pt）」として最優先にする
    # 実フィールドで計測して調整すること
    farthest_cage_z_min: 3.5

    # ── デバッグ ─────────────────────────────────────────────────────
    # true: /cage_detection/debug_image にバウンディングボックス付き画像を出力
    publish_debug_image: true

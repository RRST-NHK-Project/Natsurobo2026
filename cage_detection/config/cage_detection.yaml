cage_detection_node:
  ros__parameters:

    # ══════════════════════════════════════════════════════════════
    #  カゴ固定座標（フィールド座標系）[m]
    #
    #  座標系:
    #    原点 : スタートゾーン中心
    #    X軸  : フィールド奥方向（+）
    #    Y軸  : 左方向（+）
    #
    #  !! 実フィールドで巻き尺計測して更新すること !!
    #  現在の値はルールブック図4・図6から推定した暫定値
    #
    #  フィールド参考寸法:
    #    全体          : 10800×10800mm
    #    エリア2(ブルーシート): 3333.5×3333.5mm
    #    石倉位置      : エリア3コーナー付近
    # ══════════════════════════════════════════════════════════════

    # 緑カゴ × 2
    cage.green_0.x: 4.20
    cage.green_0.y:  0.55

    cage.green_1.x: 4.20
    cage.green_1.y: -0.55

    # 青カゴ × 5
    cage.blue_0.x: 5.40   # 奥左
    cage.blue_0.y:  1.10

    cage.blue_1.x: 5.40   # 奥右 ← 最遠カゴ（対角 +15pt）
    cage.blue_1.y: -1.10

    cage.blue_2.x: 4.80   # 中央
    cage.blue_2.y:  0.0

    cage.blue_3.x: 3.73   # 手前左
    cage.blue_3.y:  1.10

    cage.blue_4.x: 3.73   # 手前右
    cage.blue_4.y: -1.10

    # 石倉の位置（ロボットが乗る場所）
    ishikura_x: 3.20
    ishikura_y: 0.0

    # 最遠青カゴのID（スタートゾーン対角）
    farthest_blue_id: "blue_1"

    # 配信レート [Hz]
    publish_rate_hz: 10.0

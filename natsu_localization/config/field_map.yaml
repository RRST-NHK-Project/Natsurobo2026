scan_matcher_localizer:
  ros__parameters:
    # ═══════════════════════════════════════════════════════════════════
    #  既知フィールド壁マップ（scan-to-known-map ICP の参照地図）
    # ═══════════════════════════════════════════════════════════════════
    # 座標系: フィールド座標 [m]。原点 = スタートゾーン中心、x=前方(エリア2方向)、
    #         y=左。cage_detection_node.cpp / CageViz.js と同一規約。
    #
    # ルールブック図4の寸法（暫定値）:
    #   全体 10.8m角、エリア2 3.3335m角=フィールド中心、原点→エリア2手前端 3.733m
    #   → フィールド中心は (5.4, 0)。外周壁はそれを中心とする 10.8m角。
    #
    # !! 重要 !! 以下は文献値からの暫定マップ。実フィールドで LiDAR が実際に
    #            見える面（外周フェンス高さ・石倉形状）を計測して必ず更新すること。
    #            cage_detection_node.cpp と同じく「実測で確定」が前提。
    #
    # segments: [x1,y1,x2,y2,  x1,y1,x2,y2, ...] の平坦配列（1線分=4要素）。
    #           線分の法線はノードが端点から自動計算する（向きは不問）。
    field_map.segments:
      # ── 外周壁（10.8m角, 中心(5.4,0)）──────────────────
      - 10.8   # 前壁(奥):  (10.8,-5.4)-(10.8,+5.4)
      - -5.4
      - 10.8
      -  5.4
      -  0.0   # 後壁(スタート背後): (0,-5.4)-(0,+5.4)
      - -5.4
      -  0.0
      -  5.4
      -  0.0   # 左壁: (0,5.4)-(10.8,5.4)
      -  5.4
      - 10.8
      -  5.4
      -  0.0   # 右壁: (0,-5.4)-(10.8,-5.4)
      - -5.4
      - 10.8
      - -5.4
      # ── 石倉 近接面（暫定: x=3.2 の正面, 幅±0.6 と仮定。要実測）──
      -  3.2
      - -0.6
      -  3.2
      -  0.6

    # ── ロボットのスタート姿勢（フィールド座標）──────────
    # summer2026_odometry は起動位置を odom 原点(0,0,0)とするので、
    # 「スタート時にフィールドのどこに居るか」をここで与える。既定=原点。
    start_pose: [0.0, 0.0, 0.0]   # [x(m), y(m), yaw(rad)]

    # ── LiDAR(LD19) 取付オフセット: base_link → ldlidar_link ──
    # 実機の static_transform_publisher と一致させること。
    lidar_x:   0.0     # [m] base_link から前方
    lidar_y:   0.0     # [m] base_link から左
    lidar_yaw: 0.0     # [rad] 取付ヨー（前方ズレ）

    # ── 入出力トピック ──────────────────────────────────
    scan_topic: "/scan"
    odom_topic: "odom"
    pose_topic: "/localization/pose"   # PoseWithCovarianceStamped(map)
    publish_tf: true                   # map -> odom を broadcast
    map_frame:  "map"
    odom_frame: "odom"

    # ── スキャン前処理 ──────────────────────────────────
    range_min: 0.10    # [m] これ未満は捨てる
    range_max: 12.0    # [m] これ超過は捨てる（LD19仕様15mだが遠点は誤対応の元）
    point_skip: 2      # 何点に1点使うか（間引き。1=全点）

    # ── ICP（PoseEstimatorICP + DataAssociator 相当）──────
    icp_max_iter: 30        # ICP反復上限
    icp_dthre: 0.30         # [m] 点-線分 対応づけ距離ゲート（外れ値除去）
    icp_dthre_end: 0.10     # [m] 反復終盤の対応づけゲート（徐々に厳しく）
    gn_max_iter: 5          # 1反復内の Gauss-Newton 回数
    converge_delta: 0.001   # 収束判定（並進m/回転rad の更新量）

    # ── マッチング成否ゲート（失敗時は odom 予測にフォールバック）──
    min_match_ratio: 0.30   # 対応がとれた点の最低比率
    min_match_points: 30    # 対応点の最低数
    max_mean_error: 0.10    # [m] 平均残差の上限

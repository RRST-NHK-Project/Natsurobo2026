wall_detection_node:
  ros__parameters:
    # ── FOV設定 ──────────────────────────────────────────────────────
    # 通常モード: 前方±60°をスキャン（石倉に近づいている間）
    fov_half_deg: 60.0

    # 照準モード: aiming_mode=true のとき ±20° に絞り込む
    # 石倉に乗った後、カゴ方向だけに集中させる
    aiming_fov_half_deg: 20.0

    # 起動時のデフォルト。ランタイムは /wall_detection/aiming_mode トピックで切り替え
    aiming_mode: false

    # ── 距離ゲート [Add 1] ──────────────────────────────────────────
    # 石倉〜エリア2の距離帯を想定して設定
    # フィールド: エリア2はエリア3から数m程度離れている
    # 外周壁(約5m先)への誤フィットをここで防ぐ
    distance_gate_min: 0.10   # [m] これ以下は無視（センサー近接ノイズ）
    distance_gate_max: 3.50   # [m] これ以上は無視（外周壁等）

    # ── 点群品質フィルタ ─────────────────────────────────────────────
    # 連続する2点間の角度差がこれを超えたら不連続とみなして除外
    max_angle_step_deg: 5.0

    # ── RANSAC設定 ───────────────────────────────────────────────────
    ransac_iterations: 50       # イテレーション数（軽量優先）
    ransac_threshold: 0.03      # インライア判定距離 [m] (3cm)
    ransac_min_inliers: 8       # 最低インライア数
    min_inlier_ratio: 0.5       # インライア率の下限

    # ── LPF設定 ──────────────────────────────────────────────────────
    # alpha = 0に近いほど強く平滑化（反応が遅くなる）
    # alpha = 1に近いほど生値に追従（ノイズが多い）
    line_lpf_alpha:  0.30   # a,b成分（向き）の平滑化
    angle_lpf_alpha: 0.20   # 最終出力角度の平滑化（角度折り返し対応済み）
    dist_lpf_alpha:  0.20   # 距離(|c|)の独立平滑化 [Fix 1]

    # ── ウォームスタート [Add 2] ──────────────────────────────────────
    # 前フレームの直線がこの角度差以内に収まればRANSACをスキップ
    warm_start_threshold_deg: 3.0

    # ── 取り付けオフセット補正 [Add 4] ────────────────────────────────
    # LiDARが機体正面からズレて固定されている場合に設定
    # 実機で壁に正対した状態で /wall_detection/angle を確認し、
    # その値の符号を反転した値をここに入れる
    # 例: 出力が +0.05rad (≒+2.9°) なら angle_offset_deg: -2.9
    angle_offset_deg: 0.0

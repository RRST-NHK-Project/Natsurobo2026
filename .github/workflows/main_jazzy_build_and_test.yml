# Github上でのCI/CDを使用して、ROS 2 Jazzyのビルドを行うためのGitHub Actionsワークフロー
# 2025/10/28:高速化のため、公式ROSイメージを使用するように変更
name: ROS 2 Jazzy Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  jazzy-build-and-test:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy  # ← 公式ROSイメージを使用
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y python3-colcon-common-extensions

      - name: Create ROS 2 workspace
        shell: bash
        run: |
          mkdir -p ros2_ws/src
          shopt -s extglob
          mv !(ros2_ws) ros2_ws/src/ || true
          cd ros2_ws
          source /opt/ros/jazzy/setup.bash
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y

      - name: Build workspace
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros2_ws
          colcon build --symlink-install --event-handlers console_cohesion+

              - name: Test workspace
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros2_ws
          source install/setup.bash
          colcon test --event-handlers console_cohesion+
          colcon test-result --verbose
